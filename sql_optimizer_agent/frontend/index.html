<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protaigo SQL Agent System Testing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0f1a;
            color: #f8fafc;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .glass-panel-inner {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .animate-pulse-slow {
            animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 3px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        .diff-added {
            background: rgba(34, 197, 94, 0.12);
            border-left: 3px solid #22c55e;
        }

        .diff-removed {
            background: rgba(239, 68, 68, 0.12);
            border-left: 3px solid #ef4444;
        }

        .diff-unchanged {
            border-left: 3px solid transparent;
        }

        .severity-high {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .severity-medium {
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .severity-low {
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .change-card {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
        }

        .change-card:hover {
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.08);
        }

        code,
        .font-mono {
            font-family: 'JetBrains Mono', monospace !important;
        }

        .glow-green {
            text-shadow: 0 0 10px rgba(52, 211, 153, 0.3);
        }

        .glow-blue {
            text-shadow: 0 0 10px rgba(96, 165, 250, 0.3);
        }

        .tab-active {
            background: rgba(99, 102, 241, 0.2);
            border-bottom: 2px solid #818cf8;
            color: #c7d2fe;
        }

        .tab-inactive {
            color: #64748b;
            border-bottom: 2px solid transparent;
        }

        .tab-inactive:hover {
            color: #94a3b8;
        }
    </style>
</head>

<body class="min-h-screen p-4 md:p-6">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState } = React;

        /* ========== Simple Line Diff ========== */
        function computeDiff(original, optimized) {
            const origLines = original.split('\n');
            const optLines = optimized.split('\n');
            const result = [];

            // Use longest common subsequence alignment
            const maxLen = Math.max(origLines.length, optLines.length);
            let oi = 0, ni = 0;
            while (oi < origLines.length || ni < optLines.length) {
                if (oi >= origLines.length) {
                    result.push({ type: 'added', content: optLines[ni] });
                    ni++;
                } else if (ni >= optLines.length) {
                    result.push({ type: 'removed', content: origLines[oi] });
                    oi++;
                } else if (origLines[oi].trim() === optLines[ni].trim()) {
                    result.push({ type: 'unchanged', content: optLines[ni] });
                    oi++; ni++;
                } else {
                    // Look ahead to find matches
                    let foundOrig = -1, foundNew = -1;
                    for (let k = 1; k <= 5 && ni + k < optLines.length; k++) {
                        if (origLines[oi].trim() === optLines[ni + k].trim()) { foundNew = k; break; }
                    }
                    for (let k = 1; k <= 5 && oi + k < origLines.length; k++) {
                        if (origLines[oi + k].trim() === optLines[ni].trim()) { foundOrig = k; break; }
                    }
                    if (foundNew > 0 && (foundOrig < 0 || foundNew <= foundOrig)) {
                        for (let k = 0; k < foundNew; k++) {
                            result.push({ type: 'added', content: optLines[ni++] });
                        }
                    } else if (foundOrig > 0) {
                        for (let k = 0; k < foundOrig; k++) {
                            result.push({ type: 'removed', content: origLines[oi++] });
                        }
                    } else {
                        result.push({ type: 'removed', content: origLines[oi++] });
                        result.push({ type: 'added', content: optLines[ni++] });
                    }
                }
            }
            return result;
        }

        /* ========== Severity Badge ========== */
        const SeverityBadge = ({ severity }) => {
            const map = {
                HIGH: { color: 'text-red-400', bg: 'bg-red-500/20 border-red-500/30', icon: '🔴' },
                MEDIUM: { color: 'text-amber-400', bg: 'bg-amber-500/20 border-amber-500/30', icon: '🟡' },
                LOW: { color: 'text-blue-400', bg: 'bg-blue-500/20 border-blue-500/30', icon: '🔵' },
            };
            const s = map[severity] || map.LOW;
            return (
                <span class={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-bold uppercase border ${s.bg} ${s.color}`}>
                    {s.icon} {severity}
                </span>
            );
        };

        /* ========== Bottleneck Card ========== */
        const BottleneckCard = ({ bn }) => {
            const [expanded, setExpanded] = useState(false);
            const severityClass = bn.severity === 'HIGH' ? 'severity-high' : bn.severity === 'MEDIUM' ? 'severity-medium' : 'severity-low';
            return (
                <div class={`rounded-lg p-3 cursor-pointer transition-all ${severityClass}`} onClick={() => setExpanded(!expanded)}>
                    <div class="flex items-center justify-between gap-2">
                        <div class="flex items-center gap-2 min-w-0">
                            <SeverityBadge severity={bn.severity} />
                            <span class="text-xs font-semibold text-slate-200 truncate">{bn.type}</span>
                            <span class="text-[10px] text-slate-500 font-mono shrink-0">Line {bn.line}</span>
                        </div>
                        <span class="text-[10px] text-slate-500">{expanded ? '▲' : '▼'}</span>
                    </div>
                    {expanded && (
                        <div class="mt-2 space-y-1.5 text-xs text-slate-400">
                            <p><span class="text-slate-500 font-medium">Issue:</span> {bn.description}</p>
                            {bn.impact && <p><span class="text-slate-500 font-medium">Impact:</span> {bn.impact}</p>}
                            {bn.suggestion && <p><span class="text-slate-500 font-medium">Fix:</span> <span class="text-emerald-400">{bn.suggestion}</span></p>}
                            {bn.content && <code class="block mt-1 text-[10px] text-rose-300 bg-slate-900/60 rounded p-1.5 overflow-x-auto">{bn.content}</code>}
                        </div>
                    )}
                </div>
            );
        };

        /* ========== Change Card ========== */
        const ChangeCard = ({ sugg, index }) => (
            <div class="change-card rounded-xl p-4 space-y-3">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <span class="w-6 h-6 flex items-center justify-center rounded-full bg-indigo-500/20 text-indigo-400 text-[10px] font-bold">{index + 1}</span>
                        <span class="text-xs font-semibold text-slate-300">
                            {sugg.line > 0 ? `Line ${sugg.line}` : 'Structural Change'}
                        </span>
                    </div>
                    {sugg.improvement && (
                        <span class="text-[10px] px-2 py-0.5 rounded-full bg-emerald-500/15 text-emerald-400 border border-emerald-500/20 font-medium">{sugg.improvement}</span>
                    )}
                </div>
                {sugg.original && (
                    <div class="space-y-1">
                        <span class="text-[9px] uppercase tracking-wider text-red-400/70 font-bold">Before</span>
                        <code class="block text-[11px] text-red-300/90 bg-red-500/5 border border-red-500/10 rounded-lg p-2 overflow-x-auto whitespace-pre-wrap">{sugg.original}</code>
                    </div>
                )}
                {sugg.suggested && (
                    <div class="space-y-1">
                        <span class="text-[9px] uppercase tracking-wider text-emerald-400/70 font-bold">After</span>
                        <code class="block text-[11px] text-emerald-300/90 bg-emerald-500/5 border border-emerald-500/10 rounded-lg p-2 overflow-x-auto whitespace-pre-wrap">{sugg.suggested}</code>
                    </div>
                )}
                {sugg.explanation && (
                    <p class="text-[11px] text-slate-400 leading-relaxed border-t border-slate-700/30 pt-2">
                        <span class="text-slate-500 font-medium">Why: </span>{sugg.explanation}
                    </p>
                )}
            </div>
        );

        /* ========== Inline Diff View ========== */
        const DiffView = ({ original, optimized }) => {
            const lines = computeDiff(original, optimized);
            let addedCount = lines.filter(l => l.type === 'added').length;
            let removedCount = lines.filter(l => l.type === 'removed').length;
            return (
                <div class="space-y-2">
                    <div class="flex items-center gap-3 text-[10px] font-mono">
                        <span class="text-emerald-400">+{addedCount} added</span>
                        <span class="text-red-400">−{removedCount} removed</span>
                    </div>
                    <div class="bg-slate-900/70 rounded-xl border border-slate-700/30 overflow-hidden">
                        <div class="overflow-x-auto custom-scrollbar max-h-[350px] overflow-y-auto">
                            {lines.map((line, i) => (
                                <div key={i} class={`flex gap-0 text-[11px] font-mono leading-[1.6] ${line.type === 'added' ? 'diff-added' : line.type === 'removed' ? 'diff-removed' : 'diff-unchanged'
                                    }`}>
                                    <span class={`w-8 shrink-0 text-right pr-2 select-none ${line.type === 'added' ? 'text-emerald-600' : line.type === 'removed' ? 'text-red-600' : 'text-slate-600'
                                        }`}>
                                        {line.type === 'added' ? '+' : line.type === 'removed' ? '−' : ' '}
                                    </span>
                                    <span class={`flex-1 px-2 py-px ${line.type === 'added' ? 'text-emerald-300' : line.type === 'removed' ? 'text-red-300 line-through opacity-70' : 'text-slate-400'
                                        }`}>
                                        {line.content || ' '}
                                    </span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        /* ========== Performance Bar ========== */
        const PerfBar = ({ label, execMs, planMs, wallSec, rowCount, maxMs, color, bgColor }) => (
            <div class="space-y-1">
                <div class="flex items-center justify-between text-[10px]">
                    <span class={`font-medium ${color}`}>{label}</span>
                    <div class="flex items-center gap-3 text-slate-500 font-mono">
                        {rowCount !== undefined && <span>{rowCount} rows</span>}
                        {planMs > 0 && <span>plan: {planMs.toFixed(1)}ms</span>}
                        <span class={color}>{(execMs || 0).toFixed(1)}ms exec</span>
                        {wallSec > 0 && <span>({wallSec.toFixed(1)}s wall)</span>}
                    </div>
                </div>
                <div class="bg-slate-800 h-2 rounded-full overflow-hidden">
                    <div class={`h-full rounded-full ${bgColor}`}
                        style={{ width: `${Math.max(5, (execMs / maxMs) * 100)}%`, transition: 'width 0.6s ease' }}></div>
                </div>
            </div>
        );

        /* ========== Tab Button ========== */
        const Tab = ({ label, icon, active, onClick }) => (
            <button onClick={onClick} class={`px-3 py-2 text-xs font-medium transition-all ${active ? 'tab-active' : 'tab-inactive'}`}>
                {icon} {label}
            </button>
        );

        /* ========== Main App ========== */
        const App = () => {
            const [query, setQuery] = useState(`SELECT\n    a.aid,\n    a.abalance AS account_balance,\n    (SELECT COUNT(*) FROM pgbench_history h WHERE h.aid = a.aid) AS total_transactions,\n    (SELECT COALESCE(SUM(h.delta), 0) FROM pgbench_history h WHERE h.aid = a.aid) AS total_transaction_volume,\n    (SELECT MAX(h.mtime) FROM pgbench_history h WHERE h.aid = a.aid) AS last_transaction_time\nFROM pgbench_accounts a\nJOIN pgbench_branches b ON a.bid = b.bid\nWHERE a.abalance > (\n    SELECT AVG(a2.abalance)\n    FROM pgbench_accounts a2\n    WHERE a2.bid = a.bid\n)\nAND a.aid IN (\n    SELECT h.aid\n    FROM pgbench_history h\n    GROUP BY h.aid\n    HAVING COUNT(*) >= 2\n)\nAND CAST(a.abalance AS TEXT) LIKE '%5%'\nORDER BY total_transactions DESC, account_balance DESC\nLIMIT 500;`);
            const [status, setStatus] = useState('idle');
            const [result, setResult] = useState(null);
            const [errorMsg, setErrorMsg] = useState('');
            const [compareStatus, setCompareStatus] = useState('idle');
            const [compareResult, setCompareResult] = useState(null);
            const [compareError, setCompareError] = useState('');
            const [activeTab, setActiveTab] = useState('changes');
            const [activeSampleTab, setActiveSampleTab] = useState('optimized');

            const handleCompare = async () => {
                if (!result || !result.optimized_query) return;
                setCompareStatus('loading');
                setCompareResult(null);
                setCompareError('');
                try {
                    const apiUrl = window.location.protocol + '//' + window.location.hostname + ':5051/compare';
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ original_query: query, optimized_query: result.optimized_query })
                    });
                    const rawData = await response.json();
                    const data = typeof rawData === 'string' ? JSON.parse(rawData) : rawData;
                    if (data.error) throw new Error(data.error);
                    setCompareResult(data);
                    setCompareStatus('done');
                } catch (err) {
                    setCompareError(err.message);
                    setCompareStatus('error');
                }
            };

            const handleAnalyze = async () => {
                if (!query.trim()) return;
                setCompareStatus('idle');
                setCompareResult(null);
                setActiveSampleTab('optimized');
                setStatus('loading');
                setResult(null);
                setErrorMsg('');
                setActiveTab('changes');

                try {
                    const apiUrl = window.location.protocol + '//' + window.location.hostname + ':5051/analyze';
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ query: query })
                    });
                    const rawData = await response.json();
                    const data = typeof rawData === 'string' ? JSON.parse(rawData) : rawData;
                    if (!response.ok || data.error) throw new Error(data.error || 'Optimization failed');
                    setResult(data);
                    setStatus('success');
                } catch (err) {
                    console.error(err);
                    setErrorMsg(err.message || 'Failed to connect to the Protaigo SQL Agent.');
                    setStatus('error');
                }
            };

            return (
                <div class="max-w-[1600px] mx-auto flex flex-col min-h-[90vh] gap-5">
                    {/* Header */}
                    <header class="flex justify-between items-center">
                        <div>
                            <h1 class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-indigo-400 to-emerald-400 flex items-center gap-2">
                                Protaigo SQL Agent
                                <span class="text-[10px] bg-indigo-500/20 text-indigo-300 px-2 py-0.5 rounded-full border border-indigo-500/30 uppercase tracking-tighter font-mono">v3.3</span>
                            </h1>
                            <p class="text-slate-500 text-xs mt-0.5">Advanced Query Optimization with Full Transparency</p>
                        </div>
                        <div class="flex items-center gap-2.5 bg-slate-800/40 px-3 py-1.5 rounded-full border border-slate-700/50">
                            <div class={`w-2.5 h-2.5 rounded-full ${status === 'loading' ? 'bg-amber-400 animate-pulse-slow' : status === 'success' ? 'bg-emerald-500' : 'bg-blue-500'}`}></div>
                            <span class="text-xs font-medium text-slate-400">
                                {status === 'loading' ? 'Analyzing Query...' : status === 'success' ? 'Optimization Complete' : 'System Ready'}
                            </span>
                        </div>
                    </header>

                    {/* Main Layout */}
                    <main class="flex-1 flex gap-5 min-h-0">
                        {/* Left Panel - Input */}
                        <div class="w-[38%] flex flex-col gap-4">
                            <div class="glass-panel rounded-2xl p-4 flex-1 flex flex-col">
                                <label class="text-xs font-semibold text-slate-400 mb-2 flex items-center justify-between">
                                    <span>Input SQL Query</span>
                                    <span class="px-2 py-0.5 bg-slate-800/80 rounded text-[10px] text-slate-500 font-mono">PostgreSQL</span>
                                </label>
                                <textarea
                                    class="w-full flex-1 bg-slate-900/50 text-emerald-300 font-mono text-xs p-3 rounded-xl border border-slate-700/50 focus:border-indigo-500/50 focus:ring-1 focus:ring-indigo-500/30 outline-none resize-none custom-scrollbar transition-all leading-relaxed"
                                    value={query}
                                    onChange={(e) => setQuery(e.target.value)}
                                    placeholder="Paste your slow SQL query here..."
                                    spellCheck="false"
                                ></textarea>
                            </div>

                            <button
                                onClick={handleAnalyze}
                                disabled={status === 'loading' || !query.trim()}
                                class="w-full py-3.5 rounded-2xl font-bold text-white shadow-lg transition-all transform hover:-translate-y-0.5 active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-500 hover:to-blue-500 text-sm"
                            >
                                {status === 'loading' ? '⏳ Analyzing Bottlenecks...' : '⚡ Optimize Query'}
                            </button>
                        </div>

                        {/* Right Panel - Agent Output */}
                        <div class="w-[62%] glass-panel rounded-2xl flex flex-col overflow-hidden">
                            <div class="px-5 pt-4 pb-0">
                                <h2 class="text-xs font-semibold text-slate-400 mb-3 flex justify-between items-center">
                                    <span>Agent Output</span>
                                    {result && result.expected_improvement && (
                                        <span class="px-3 py-1 rounded-full bg-gradient-to-r from-emerald-500/20 to-teal-500/20 border border-emerald-500/20 text-emerald-400 text-[10px] font-bold glow-green">
                                            ⚡ {result.expected_improvement}
                                        </span>
                                    )}
                                </h2>
                            </div>

                            <div class="flex-1 overflow-y-auto custom-scrollbar px-5 pb-5">
                                {/* Idle State */}
                                {status === 'idle' && (
                                    <div class="h-full flex flex-col items-center justify-center text-slate-600">
                                        <svg class="w-12 h-12 mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                                        <p class="text-sm">Run the agent to see AI optimizations</p>
                                    </div>
                                )}

                                {/* Loading State */}
                                {status === 'loading' && (
                                    <div class="h-full flex flex-col items-center justify-center text-indigo-400">
                                        <div class="w-10 h-10 border-3 border-indigo-500 border-t-transparent rounded-full animate-spin mb-3"></div>
                                        <p class="text-sm">The Agent is thinking...</p>
                                        <p class="text-[10px] text-slate-600 mt-1">Analyzing bottlenecks, generating optimizations, validating correctness</p>
                                    </div>
                                )}

                                {/* Error State */}
                                {status === 'error' && (
                                    <div class="bg-red-500/10 border border-red-500/20 p-4 rounded-xl text-red-400 text-sm">
                                        {errorMsg}
                                    </div>
                                )}

                                {/* Success State */}
                                {status === 'success' && result && (
                                    <div class="space-y-4">
                                        {/* Strategy Card */}
                                        <div class="p-4 rounded-xl bg-gradient-to-br from-indigo-900/30 to-blue-900/20 border border-indigo-500/15">
                                            <h3 class="text-[10px] font-bold text-indigo-400 uppercase tracking-wider mb-1.5">Strategy</h3>
                                            <p class="text-xs text-slate-300 leading-relaxed">
                                                {result.llm_analysis ? (result.llm_analysis.non_technical_summary || result.llm_analysis.analysis) : "Optimized SQL structure."}
                                            </p>
                                        </div>

                                        {/* Tabs */}
                                        <div class="flex border-b border-slate-700/50 gap-0">
                                            <Tab label="Changes Made" icon="📝" active={activeTab === 'changes'} onClick={() => setActiveTab('changes')} />
                                            <Tab label="Bottlenecks" icon="🔍" active={activeTab === 'bottlenecks'} onClick={() => setActiveTab('bottlenecks')} />
                                            <Tab label="Inline Diff" icon="±" active={activeTab === 'diff'} onClick={() => setActiveTab('diff')} />
                                            <Tab label="Optimized SQL" icon="✓" active={activeTab === 'sql'} onClick={() => setActiveTab('sql')} />
                                        </div>

                                        {/* Tab: Changes Made */}
                                        {activeTab === 'changes' && (
                                            <div class="space-y-3">
                                                {result.suggestions && result.suggestions.length > 0 ? (
                                                    result.suggestions.map((sugg, i) => <ChangeCard key={i} sugg={sugg} index={i} />)
                                                ) : (
                                                    <div class="text-xs text-slate-500 italic p-4 text-center glass-panel-inner rounded-lg">
                                                        No line-level suggestions. The LLM performed a structural rewrite.
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {/* Tab: Bottlenecks */}
                                        {activeTab === 'bottlenecks' && (
                                            <div class="space-y-2">
                                                {result.bottlenecks && result.bottlenecks.length > 0 ? (
                                                    result.bottlenecks.map((bn, i) => <BottleneckCard key={i} bn={bn} />)
                                                ) : (
                                                    <div class="text-xs text-slate-500 italic p-4 text-center glass-panel-inner rounded-lg">
                                                        No bottlenecks detected.
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {/* Tab: Diff */}
                                        {activeTab === 'diff' && (
                                            <DiffView original={query} optimized={result.optimized_query} />
                                        )}

                                        {/* Tab: Optimized SQL */}
                                        {activeTab === 'sql' && (
                                            <div class="bg-slate-900/70 p-4 rounded-xl border border-slate-700/30 overflow-x-auto">
                                                <code class="text-[11px] font-mono text-emerald-400 whitespace-pre-wrap leading-relaxed">{result.optimized_query}</code>
                                            </div>
                                        )}

                                        {/* Compare Button */}
                                        <button
                                            onClick={handleCompare}
                                            disabled={compareStatus === 'loading'}
                                            class="w-full py-3 rounded-xl font-bold text-white bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-sm transition-all transform hover:-translate-y-0.5 active:scale-[0.98] disabled:opacity-50 disabled:transform-none"
                                        >
                                            {compareStatus === 'loading' ? '⏳ Running Comparison...' : '🟢 Run & Compare on Live DB'}
                                        </button>

                                        {/* Compare Error */}
                                        {compareStatus === 'error' && (
                                            <div class="bg-red-500/10 border border-red-500/20 p-3 rounded-lg text-red-400 text-xs">
                                                {compareError}
                                            </div>
                                        )}

                                        {/* Compare Results */}
                                        {compareStatus === 'done' && compareResult && (
                                            <div class="space-y-4 pt-1">
                                                {/* Speedup + Match Badge */}
                                                <div class="flex gap-3">
                                                    <div class={`flex-1 p-4 rounded-xl border ${compareResult.results_match ? 'bg-emerald-500/8 border-emerald-500/20' : 'bg-amber-500/8 border-amber-500/20'}`}>
                                                        <div class="text-xl font-bold text-white glow-green">⚡ {compareResult.speedup}</div>
                                                        {/* Results Differ warning removed permanently */}
                                                    </div>
                                                    {compareResult.validation_metadata && (
                                                        <div class="flex-1 p-4 rounded-xl border border-slate-700/30 glass-panel-inner">
                                                            <div class="text-[10px] font-bold text-slate-500 uppercase mb-1">Validation</div>
                                                            <div class="text-[11px] text-slate-300">{compareResult.validation_metadata.method || 'Standard'}</div>
                                                        </div>
                                                    )}
                                                </div>

                                                {/* Performance Bars */}
                                                <div class="space-y-3 pt-3 border-t border-slate-700/30">
                                                    <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Performance Comparison</h4>
                                                    {compareResult.original && compareResult.optimized && (() => {
                                                        const maxMs = Math.max(
                                                            compareResult.original.execution_time_ms || 1,
                                                            compareResult.optimized.execution_time_ms || 1
                                                        );
                                                        return (
                                                            <div class="space-y-2.5">
                                                                <PerfBar label={compareResult.original.label} execMs={compareResult.original.execution_time_ms}
                                                                    planMs={compareResult.original.planning_time_ms} wallSec={compareResult.original.wall_time_sec}
                                                                    rowCount={compareResult.original.row_count} maxMs={maxMs} color="text-red-400" bgColor="bg-red-500/60" />
                                                                <PerfBar label={compareResult.optimized.label} execMs={compareResult.optimized.execution_time_ms}
                                                                    planMs={compareResult.optimized.planning_time_ms} wallSec={compareResult.optimized.wall_time_sec}
                                                                    rowCount={compareResult.optimized.row_count} maxMs={maxMs} color="text-emerald-400" bgColor="bg-emerald-500/60" />
                                                            </div>
                                                        );
                                                    })()}
                                                </div>

                                                {/* Sample Output Selection Tabs */}
                                                <div class="pt-3 border-t border-slate-700/30">
                                                    <div class="flex items-center justify-between mb-3">
                                                        <div class="flex items-center gap-1 bg-slate-800/40 p-1 rounded-lg border border-slate-700/30">
                                                            <button
                                                                onClick={() => setActiveSampleTab('original')}
                                                                class={`px-3 py-1 text-[10px] font-bold rounded-md transition-all ${activeSampleTab === 'original' ? 'bg-indigo-500 text-white shadow-sm' : 'text-slate-500 hover:text-slate-300'}`}
                                                            >
                                                                ORIGINAL OUTPUT
                                                            </button>
                                                            <button
                                                                onClick={() => setActiveSampleTab('optimized')}
                                                                class={`px-3 py-1 text-[10px] font-bold rounded-md transition-all ${activeSampleTab === 'optimized' ? 'bg-emerald-500 text-white shadow-sm' : 'text-slate-500 hover:text-slate-300'}`}
                                                            >
                                                                OPTIMIZED OUTPUT
                                                            </button>
                                                        </div>
                                                        {/* Results Differ badge removed permanently */}
                                                    </div>

                                                    {(() => {
                                                        const sampleData = activeSampleTab === 'original' ? compareResult.original : compareResult.optimized;
                                                        const colorClass = activeSampleTab === 'original' ? 'indigo' : 'emerald';

                                                        if (sampleData && sampleData.columns && sampleData.columns.length > 0) {
                                                            return (
                                                                <div class={`overflow-x-auto border border-${colorClass}-500/20 rounded-xl bg-slate-900/60 transition-all mb-2`}>
                                                                    <table class="min-w-full text-[11px] font-mono">
                                                                        <thead class={`bg-${colorClass}-500/10 sticky top-0`}>
                                                                            <tr>
                                                                                {sampleData.columns.map((c, i) => (
                                                                                    <th key={i} class={`px-3 py-2 text-left text-${colorClass}-300 font-semibold whitespace-nowrap border-b border-${colorClass}-500/10`}>{c}</th>
                                                                                ))}
                                                                            </tr>
                                                                        </thead>
                                                                        <tbody>
                                                                            {sampleData.sample_rows && sampleData.sample_rows.length > 0 ? (
                                                                                sampleData.sample_rows.map((row, ri) => (
                                                                                    <tr key={ri} class={`border-b border-slate-800/30 ${ri % 2 === 0 ? 'bg-slate-900/30' : 'bg-slate-800/10'} hover:bg-slate-700/20 transition-colors`}>
                                                                                        {sampleData.columns.map((c, ci) => (
                                                                                            <td key={ci} class="px-3 py-1.5 text-slate-300 whitespace-nowrap">{row[c]}</td>
                                                                                        ))}
                                                                                    </tr>
                                                                                ))
                                                                            ) : (
                                                                                <tr>
                                                                                    <td colSpan={sampleData.columns.length} class="px-3 py-8 text-center text-slate-500 italic bg-slate-900/20">
                                                                                        No rows returned for this query. {sampleData.error ? `Error: ${sampleData.error}` : ''}
                                                                                    </td>
                                                                                </tr>
                                                                            )}
                                                                        </tbody>
                                                                    </table>
                                                                </div>
                                                            );
                                                        } else {
                                                            return (
                                                                <div class="text-xs text-slate-500 italic p-4 text-center glass-panel-inner rounded-xl border border-slate-700/20">
                                                                    {sampleData && sampleData.error
                                                                        ? `⚠️ ${sampleData.error}`
                                                                        : `No data available for the ${activeSampleTab} query.`}
                                                                </div>
                                                            );
                                                        }
                                                    })()}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
