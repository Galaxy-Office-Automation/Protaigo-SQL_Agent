pgbench_branches:
  description: "Represents the bank branches"
  columns:
    - name: "bid"
      type: "INTEGER"
      constraints: "PRIMARY KEY"
      description: "Branch ID"
    - name: "bbalance"
      type: "INTEGER"
      description: "Total branch balance"
    - name: "filler"
      type: "CHARACTER(88)"
      description: "Padding to simulate larger rows"

pgbench_accounts:
  description: "Represents the individual user accounts. Largest table with ~5,000,000 rows."
  columns:
    - name: "aid"
      type: "INTEGER"
      constraints: "PRIMARY KEY"
      description: "Account ID"
    - name: "bid"
      type: "INTEGER"
      description: "Branch ID (Foreign Key to pgbench_branches)"
    - name: "abalance"
      type: "INTEGER"
      description: "Account balance"
    - name: "filler"
      type: "CHARACTER(84)"
      description: "Padding to simulate larger rows"

pgbench_tellers:
  description: "Represents the bank tellers working at the branches."
  columns:
    - name: "tid"
      type: "INTEGER"
      constraints: "PRIMARY KEY"
      description: "Teller ID"
    - name: "bid"
      type: "INTEGER"
      description: "Branch ID"
    - name: "tbalance"
      type: "INTEGER"
      description: "Total transactions handled by teller"
    - name: "filler"
      type: "CHARACTER(84)"
      description: "Padding"

pgbench_history:
  description: "Records individual transactions."
  columns:
    - name: "tid"
      type: "INTEGER"
      description: "Teller ID"
    - name: "bid"
      type: "INTEGER"
      description: "Branch ID"
    - name: "aid"
      type: "INTEGER"
      description: "Account ID"
    - name: "delta"
      type: "INTEGER"
      description: "Amount of the transaction"
    - name: "mtime"
      type: "TIMESTAMP"
      description: "Time of the transaction"
    - name: "filler"
      type: "CHARACTER(22)"
      description: "Padding"
